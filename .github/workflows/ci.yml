name: Abaddon CI

on: [ push, pull_request ]

jobs:
  linux:
    name: linux-${{ matrix.buildtype }}
    runs-on: ubuntu-latest
    container:
      image: debian:testing
    strategy:
      matrix:
        buildtype: [ MinSizeRel ]
    steps:
      - uses: actions/checkout@v1
        with:
          submodules: true

      - name: Fetch dependencies
        run: |
          apt update
          apt install -y git unzip make g++ libgtkmm-3.0-dev libcurl4-gnutls-dev libsqlite3-dev libssl-dev nlohmann-json3-dev libhandy-1-dev libsecret-1-dev libopus-dev libsodium-dev libspdlog-dev

      - name: Fetch CMake
        uses: lukka/get-cmake@latest
        
      - name: Build json
        run: |
          mkdir deps
          cd deps
          git clone https://github.com/nlohmann/json
          cd json
          git checkout 55f93686c01528224f448c19128836e7df245f72
          mkdir build
          cd build
          cmake .. -DJSON_BuildTests=OFF
          make
          make install

      - name: Build
        run: |
          cmake -Bbuild -DCMAKE_BUILD_TYPE=${{ matrix.buildtype }}
          cmake --build build
      
      - name: Set version'
        shell: bash
        run: echo "version=0.0.0+git${GITHUB_SHA::7}" >> $GITHUB_ENV
        
      - name: Setup artifact files and build .deb
        id: package
        shell: bash
        env:
          pkgname: "abaddon"
          arch: "amd64"
        run: |
          set -euo pipefail
          artifact_dir=artifactdir
          pkgdir=packaging/${{env.pkgname}}_${{env.version}}_${{env.arch}}

          mkdir -p "${artifact_dir}"
          rm -rf "${pkgdir}"
          mkdir -p "${pkgdir}/DEBIAN"
          mkdir -p "${pkgdir}/usr/bin"
          mkdir -p "${pkgdir}/usr/local/share/${{env.pkgname}}/res"
          mkdir -p "${pkgdir}/usr/local/share/${{env.pkgname}}/css"

          cp build/abaddon "${pkgdir}/usr/bin/${{env.pkgname}}"
          cp -r res/css/* "${pkgdir}/usr/local/share/${{env.pkgname}}/css/"
          cp -r res/res/* "${pkgdir}/usr/local/share/${{env.pkgname}}/res/"

          chmod 0755 "${pkgdir}/usr/bin/${{env.pkgname}}"
          chmod 0755 "${pkgdir}/usr/local/share/${{env.pkgname}}/css"
          chmod 0755 "${pkgdir}/usr/local/share/${{env.pkgname}}/res"
          chmod 0755 "${pkgdir}/DEBIAN"

          cat > "${pkgdir}/DEBIAN/control" <<'EOF'
          Package: ${{env.pkgname}}
          Version: ${{env.version}}
          Section: net
          Priority: optional
          Architecture: ${{env.arch}}
          Depends: libspdlog1.15, libsqlite3-0, libgtkmm-3.0-1t64, libglibmm-2.4-1t64, libcairo2, libpango-1.0-0, libpangomm-1.4-1v5, libcairomm-1.0-1v5, libatkmm-1.6-1v5, libsigc++-2.0-0v5, zlib1g, libcurl4-gnutls-dev, libhandy-1-0, libssl3t64, libsodium23, libfmt10, libsecret-1-0, libopus0, libepoxy0, libfontconfig1, libx11-6, libxext6, libxrandr2, libxfixes3, libxinerama1, libxcursor1
          Maintainer: Abaddon CI
          Description: Abaddon - An alternative Discord client with voice support made with C++ and GTK 3
          EOF

          debfile="${artifact_dir}/${{env.pkgname}}_${{env.version}}_${{env.arch}}.deb"
          dpkg-deb --build "${pkgdir}" "${debfile}"
          ls -lah "${debfile}"

          echo "debfile=${debfile}" >> "$GITHUB_OUTPUT"
          echo "version=${{env.version}}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: release-${{ github.sha }}
          release_name: abaddon-${{ github.sha }}
          body: "Automated release for commit ${{ github.sha }} (packaged .deb)."
          draft: false
          prerelease: false

      - name: Upload .deb to GitHub Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pkgname: "abaddon"
          arch: "amd64"
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.package.outputs.debfile }}
          asset_name: ${{env.pkgname}}_${{env.version}}_${{env.arch}}.deb
          asset_content_type: application/vnd.debian.binary-package
